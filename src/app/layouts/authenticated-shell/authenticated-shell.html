<div class="min-h-dvh min-w-0 overflow-x-clip bg-slate-50">
  <a
    href="#main-content"
    class="bg-brand-teal fixed top-3 left-3 z-[70] -translate-y-20 rounded-lg px-4 py-2 font-semibold text-white transition focus:translate-y-0"
  >
    Ir al contenido principal
  </a>

  @if (menuOpen() && !isDesktop()) {
    <button
      type="button"
      class="fixed inset-0 z-40 bg-slate-950/55 lg:hidden"
      aria-label="Cerrar menú principal"
      (click)="closeMenu()"
    ></button>
  }

  <aside
    id="authenticated-navigation"
    class="bg-brand-navy fixed inset-y-0 left-0 z-50 flex w-68 min-w-0 flex-col text-white shadow-2xl transition-transform duration-200 lg:translate-x-0 lg:shadow-none"
    [class.translate-x-0]="menuOpen()"
    [class.-translate-x-full]="!menuOpen()"
    [attr.aria-hidden]="!isDesktop() && !menuOpen() ? true : null"
    [attr.inert]="!isDesktop() && !menuOpen() ? '' : null"
  >
    <div class="flex h-20 items-center justify-between border-b border-white/10 px-6">
      <a
        routerLink="/dashboard"
        class="focus-visible:ring-brand-teal flex items-center gap-3 rounded-lg outline-none focus-visible:ring-2"
        (click)="closeMenu(false)"
      >
        <span
          class="bg-brand-teal grid size-10 place-items-center rounded-lg text-white"
          aria-hidden="true"
        >
          <svg
            viewBox="0 0 24 24"
            class="size-5"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="8.25"></circle>
            <path d="M12 7.5v5l3.25 2"></path>
          </svg>
        </span>
        <span class="text-xl font-bold tracking-[-0.04em]">TurnoFácil</span>
      </a>

      <button
        #closeMenuButton
        type="button"
        class="hover:bg-white/10 focus-visible:ring-brand-teal grid size-10 place-items-center rounded-lg outline-none focus-visible:ring-2 lg:hidden"
        aria-label="Cerrar menú principal"
        (click)="closeMenu()"
      >
        <svg viewBox="0 0 24 24" class="size-6" fill="none" stroke="currentColor" stroke-width="2">
          <path d="m6 6 12 12M18 6 6 18"></path>
        </svg>
      </button>
    </div>

    <nav class="flex-1 overflow-y-auto px-4 py-6" aria-label="Navegación principal">
      <ul class="space-y-1.5">
        <li>
          <a
            routerLink="/dashboard"
            routerLinkActive="bg-brand-teal text-white"
            [routerLinkActiveOptions]="{ exact: true }"
            ariaCurrentWhenActive="page"
            class="focus-visible:ring-brand-teal flex min-h-12 items-center gap-3 rounded-xl px-4 font-semibold text-white/75 outline-none transition hover:bg-white/10 hover:text-white focus-visible:ring-2"
            (click)="closeMenu(false)"
          >
            <svg
              viewBox="0 0 24 24"
              class="size-5"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              aria-hidden="true"
            >
              <path d="m3.5 11 8.5-7 8.5 7"></path>
              <path d="M5.5 9.5V20h13V9.5M9.5 20v-6h5v6"></path>
            </svg>
            Inicio
          </a>
        </li>
        <li>
          <a
            routerLink="/agenda"
            routerLinkActive="bg-brand-teal text-white shadow-sm"
            [routerLinkActiveOptions]="{ exact: true }"
            ariaCurrentWhenActive="page"
            class="focus-visible:ring-brand-teal flex min-h-12 items-center gap-3 rounded-xl px-4 font-semibold text-white/75 outline-none transition hover:bg-white/10 hover:text-white focus-visible:ring-2"
            (click)="closeMenu(false)"
          >
            <svg
              viewBox="0 0 24 24"
              class="size-5"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              aria-hidden="true"
            >
              <rect x="3.5" y="5" width="17" height="15" rx="2"></rect>
              <path d="M7 3v4M17 3v4M3.5 9.5h17"></path>
            </svg>
            Agenda
          </a>
        </li>
        <li>
          <a
            routerLink="/citas"
            routerLinkActive="bg-brand-teal text-white shadow-sm"
            [routerLinkActiveOptions]="{ exact: true }"
            ariaCurrentWhenActive="page"
            class="focus-visible:ring-brand-teal flex min-h-12 items-center gap-3 rounded-xl px-4 font-semibold text-white/75 outline-none transition hover:bg-white/10 hover:text-white focus-visible:ring-2"
            (click)="closeMenu(false)"
          >
            <svg
              viewBox="0 0 24 24"
              class="size-5"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              aria-hidden="true"
            >
              <circle cx="12" cy="12" r="8.5"></circle>
              <path d="M12 7.5v5l3.5 2"></path>
            </svg>
            Citas
          </a>
        </li>
        <li>
          <a
            routerLink="/clientes"
            routerLinkActive="bg-brand-teal text-white"
            [routerLinkActiveOptions]="{ exact: true }"
            ariaCurrentWhenActive="page"
            class="focus-visible:ring-brand-teal flex min-h-12 items-center gap-3 rounded-xl px-4 font-semibold text-white/75 outline-none transition hover:bg-white/10 hover:text-white focus-visible:ring-2"
            (click)="closeMenu(false)"
          >
            <svg
              viewBox="0 0 24 24"
              class="size-5"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              aria-hidden="true"
            >
              <path d="M16 20v-1.5a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4V20"></path>
              <circle cx="9.5" cy="7" r="3.5"></circle>
              <path d="M16 4.5a3.5 3.5 0 0 1 0 6.8M18 14.8a4 4 0 0 1 3 3.7V20"></path>
            </svg>
            Clientes
          </a>
        </li>
        <li>
          <a
            routerLink="/empleados"
            routerLinkActive="bg-brand-teal text-white shadow-sm"
            [routerLinkActiveOptions]="{ exact: true }"
            ariaCurrentWhenActive="page"
            class="focus-visible:ring-brand-teal flex min-h-12 items-center gap-3 rounded-xl px-4 font-semibold text-white/75 outline-none transition hover:bg-white/10 hover:text-white focus-visible:ring-2"
            (click)="closeMenu(false)"
          >
            <svg
              viewBox="0 0 24 24"
              class="size-5"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              aria-hidden="true"
            >
              <circle cx="12" cy="7.5" r="3.5"></circle>
              <path d="M5 20v-2a5 5 0 0 1 5-5h4a5 5 0 0 1 5 5v2"></path>
            </svg>
            Empleados
          </a>
        </li>
        <li>
          <a
            routerLink="/servicios"
            routerLinkActive="bg-brand-teal text-white shadow-sm"
            [routerLinkActiveOptions]="{ exact: true }"
            ariaCurrentWhenActive="page"
            class="focus-visible:ring-brand-teal flex min-h-12 items-center gap-3 rounded-xl px-4 font-semibold text-white/75 outline-none transition hover:bg-white/10 hover:text-white focus-visible:ring-2"
            (click)="closeMenu(false)"
          >
            <svg
              viewBox="0 0 24 24"
              class="size-5"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              aria-hidden="true"
            >
              <path d="M4 7.5h16M6.5 3.5h11l2 4v12h-15v-12ZM8 12h8M8 16h5"></path>
            </svg>
            Servicios
          </a>
        </li>
      </ul>
    </nav>

    <div class="border-t border-white/10 p-4">
      <button
        data-testid="logout"
        type="button"
        class="hover:bg-white/10 focus-visible:ring-brand-teal flex min-h-12 w-full items-center gap-3 rounded-xl px-4 font-semibold text-white/75 outline-none transition hover:text-white focus-visible:ring-2"
        (click)="logout()"
      >
        <svg
          viewBox="0 0 24 24"
          class="size-5"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          aria-hidden="true"
        >
          <path d="M10 4H5v16h5M14 8l4 4-4 4M8 12h10"></path>
        </svg>
        Cerrar sesión
      </button>
    </div>
  </aside>

  <div class="min-h-dvh min-w-0 lg:pl-68">
    <header
      class="border-brand-border sticky top-0 z-30 flex h-20 min-w-0 items-center border-b bg-white/95 px-4 backdrop-blur sm:px-6 lg:px-8"
    >
      <button
        #menuButton
        type="button"
        class="border-brand-border hover:bg-slate-50 focus-visible:ring-brand-teal mr-3 grid size-11 shrink-0 place-items-center rounded-xl border text-slate-700 outline-none focus-visible:ring-2 lg:hidden"
        aria-label="Abrir menú principal"
        aria-controls="authenticated-navigation"
        [attr.aria-expanded]="menuOpen()"
        (click)="openMenu()"
      >
        <svg
          viewBox="0 0 24 24"
          class="size-6"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          aria-hidden="true"
        >
          <path d="M4 7h16M4 12h16M4 17h16"></path>
        </svg>
      </button>

      <div class="min-w-0">
        <p class="truncate text-lg font-bold text-brand-text">{{ pageTitle() }}</p>
        <time class="text-brand-muted hidden text-sm sm:block" [attr.datetime]="todayIso">{{
          formattedDate
        }}</time>
      </div>

      <div class="ml-auto flex min-w-0 items-center gap-3 pl-4">
        <div class="hidden min-w-0 text-right sm:block">
          <p class="truncate text-sm font-bold text-brand-text">Administrador</p>
          <p class="text-brand-muted truncate text-xs">Administrador</p>
        </div>
        <span
          class="bg-brand-teal-soft text-brand-teal grid size-11 shrink-0 place-items-center rounded-full text-sm font-extrabold"
          aria-label="Avatar de Administrador"
          >AD</span
        >
      </div>
    </header>

    <main id="main-content" class="min-w-0" tabindex="-1">
      <router-outlet />
    </main>
  </div>
</div>
